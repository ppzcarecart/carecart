name: carecart_partner_sample
description: Sample partner app that opens carecart in a webview and handles
  the deep-link close from the carecart bottom-nav Home button.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon-fg.png

# carecart launcher icon — run `dart run flutter_launcher_icons`
# after `flutter pub get` to (re)generate the per-platform icon
# files inside android/ and ios/. Re-run any time you tweak
# assets/icon.png or assets/icon-fg.png.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0f766e"
  adaptive_icon_foreground: "assets/icon-fg.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
